name: Refresh + deploy dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync

      # Stockfish powers the per-loss "Drill your mistakes" puzzles. Without it
      # refresh.py degrades gracefully (puzzles render empty); with it the pass
      # adds ~60s to the build. Ubuntu installs the binary to /usr/games, which
      # is on PATH, so chess_tracker.puzzles.find_engine_path() picks it up.
      - name: Install Stockfish
        run: sudo apt-get update && sudo apt-get install -y stockfish

      - name: Cache Chess.com archives
        uses: actions/cache@v4
        with:
          path: data/raw
          key: chess-archives-${{ github.run_id }}
          restore-keys: |
            chess-archives-

      - name: Refresh dashboard
        run: uv run refresh.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

      - id: deployment
        uses: actions/deploy-pages@v4
