<!-- chess_tracker/templates/losses.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chess Tracker — Losses — {{USERNAME}}</title>
  <link rel="stylesheet" href="vendor/tabulator.min.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="vendor/chessground.base.css">
  <link rel="stylesheet" href="chessground-theme.css">
</head>
<body>
  <header id="kpi-strip"><a class="home-link" href="index.html">← repertoire</a></header>
  <main>
    <section id="review-picks">
      <h2>Review these 3 games</h2>
      <ol id="review-picks-list"></ol>
    </section>
    <section id="loss-summary">
      <h2>Loss summary</h2>
      <div id="loss-summary-cards" class="behavior-grid"></div>
      <h3 style="margin-top:1rem">Fast-mate buckets</h3>
      <div id="mate-buckets"></div>
    </section>
    <section id="blunder-phases-block" style="display:none">
      <h2>Early blunders by phase</h2>
      <div id="blunder-phases-table"></div>
      <p id="blunder-phases-coverage" class="audit-note"></p>
    </section>
    <section id="puzzle-drill-section">
      <h2>Drill your mistakes</h2>
      <p class="puzzle-intro">Each recent loss, rewound to the move where it slipped.
        Find the move that holds — only the right move is accepted.</p>
      <div id="puzzle-drill"></div>
    </section>
    <section id="losses-section">
      <h2>Recent losses → error log</h2>
      <div id="losses-table"></div>
      <button id="copy-suggestions">Copy starter entries</button>
      <h3>Error log</h3>
      <div id="error-log-table"></div>
    </section>
  </main>
  <script src="vendor/tabulator.min.js"></script>
  <script src="vendor/chessground.min.js"></script>
  <script>
    /* DATA_INJECTION_POINT */
  </script>
  <script src="app.js"></script>
</body>
</html>
